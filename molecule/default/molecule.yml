---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: pathvector-debian
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: ""
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      pathvector-debian:
        pathvector_debug: true
verifier:
  name: ansible
