---
# Tasks for UniFi systems

- name: UniFi system deployment
  when: pathvector_deploy_unifi_script | default(true)
  block:
    - name: Display UniFi deployment information
      ansible.builtin.debug:
        msg:
          - "=== UniFi System Detected ==="
          - "Deploying on-boot script for persistent installation"
          - "Bird version: {{ bird_version | default('bird2') }}"
          - "Install from official repos: {{ bird_install_from_official | default(true) }}"
          - "Script name: {{ pathvector_unifi_script_name | default('01-unifi-pathvector-setup.sh') }}"
      when: pathvector_debug | bool

    - name: Ensure UniFi on_boot.d directory exists
      ansible.builtin.file:
        path: /data/on_boot.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      register: onboot_dir_result

    - name: Deploy UniFi pathvector setup script from template
      ansible.builtin.template:
        src: unifi-pathvector-setup.sh.j2
        dest: "/data/on_boot.d/{{ pathvector_unifi_script_name | default('01-unifi-pathvector-setup.sh') }}"
        owner: root
        group: root
        mode: '0755'
        backup: yes
      register: unifi_script_deployed

    - name: Display script deployment result
      ansible.builtin.debug:
        msg:
          - "Script deployed: {{ unifi_script_deployed.changed }}"
          - "Script location: /data/on_boot.d/{{ pathvector_unifi_script_name | default('01-unifi-pathvector-setup.sh') }}"
      when: pathvector_debug | bool

# Deploy configuration to persistent location
- name: Deploy Pathvector configuration to UniFi persistent storage
  when: config_file_found | bool
  block:
    - name: Copy pathvector configuration to UniFi persistent location
      ansible.builtin.copy:
        src: "{{ pathvector_config_file }}"
        dest: /data/on_boot.d/pathvector.yml
        owner: root
        group: root
        mode: '0644'
        backup: yes
      register: unifi_config_deployed

    - name: Display configuration deployment result
      ansible.builtin.debug:
        msg:
          - "Configuration deployed to persistent storage: {{ unifi_config_deployed.changed }}"
          - "Location: /data/on_boot.d/pathvector.yml"
      when: pathvector_debug | bool

# Run the pathvector setup script directly when config or script changes.
# Do NOT use systemctl restart unifi-on-boot — that re-runs ALL scripts
# in /data/on_boot.d/ and will bounce BGP sessions.
- name: Run pathvector setup script
  ansible.builtin.command: "/data/on_boot.d/{{ pathvector_unifi_script_name | default('01-unifi-pathvector-setup.sh') }}"
  when:
    - pathvector_unifi_run_immediately | default(true)
    - (unifi_config_deployed is defined and unifi_config_deployed.changed) or
      (unifi_script_deployed is defined and unifi_script_deployed.changed)
  register: unifi_script_result
  changed_when: "'pathvector generate completed' in (unifi_script_result.stdout | default(''))"
  failed_when: unifi_script_result.rc != 0

- name: Display setup script output
  ansible.builtin.debug:
    var: unifi_script_result.stdout_lines
  when:
    - unifi_script_result is defined
    - unifi_script_result is not skipped
    - pathvector_debug | bool

# Sync /data/on_boot.d/ to shadow and run ONLY the pathvector script there.
# This avoids systemctl restart unifi-on-boot which would re-run all scripts.
- name: Sync config to shadow gateway
  ansible.builtin.shell: |
    SHADOW_CONF="/data/unifi-on-boot/shadow.conf"
    SHADOW_IP="{{ pathvector_ha_shadow_ip | default('169.254.254.3') }}"
    SHADOW_USER="root"
    SCRIPT_NAME="{{ pathvector_unifi_script_name | default('01-unifi-pathvector-setup.sh') }}"

    # Load shadow config if present
    if [ -f "$SHADOW_CONF" ]; then
      . "$SHADOW_CONF"
      SHADOW_IP="${SHADOW_IP:-{{ pathvector_ha_shadow_ip | default('169.254.254.3') }}}"
      SHADOW_USER="${SHADOW_USER:-root}"
      if [ "${SHADOW_ENABLED:-true}" != "true" ]; then
        echo "Shadow sync disabled"
        exit 0
      fi
    fi

    # Check if shadow is reachable
    if ! ping -c 1 -W 2 "$SHADOW_IP" >/dev/null 2>&1; then
      echo "Shadow gateway not reachable at $SHADOW_IP (skipping)"
      exit 0
    fi

    # Rsync /data/on_boot.d/ to shadow
    rsync -avz --delete -e "ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no" \
      /data/on_boot.d/ "${SHADOW_USER}@${SHADOW_IP}:/data/on_boot.d/" 2>&1

    # Run only the pathvector script on shadow (not all scripts)
    ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no "${SHADOW_USER}@${SHADOW_IP}" \
      "/data/on_boot.d/${SCRIPT_NAME}" 2>&1
  args:
    executable: /bin/bash
  when:
    - pathvector_unifi_run_immediately | default(true)
    - (unifi_config_deployed is defined and unifi_config_deployed.changed) or
      (unifi_script_deployed is defined and unifi_script_deployed.changed)
  changed_when: false
  failed_when: false

# Verify UniFi deployment
- name: Verify UniFi deployment
  when: pathvector_debug | bool
  block:
    - name: Check if on-boot script exists
      ansible.builtin.stat:
        path: "/data/on_boot.d/{{ pathvector_unifi_script_name | default('01-unifi-pathvector-setup.sh') }}"
      register: script_stat

    - name: Check if persistent config exists
      ansible.builtin.stat:
        path: /data/on_boot.d/pathvector.yml
      register: config_stat

    - name: Check if bird is installed (if script was run)
      ansible.builtin.command: which bird
      register: bird_installed
      changed_when: false
      failed_when: false

    - name: Check if pathvector is installed (if script was run)
      ansible.builtin.command: which pathvector
      register: pathvector_installed
      changed_when: false
      failed_when: false

    - name: Display UniFi deployment summary
      ansible.builtin.debug:
        msg:
          - "=== UniFi Deployment Summary ==="
          - "On-boot script: {{ 'Deployed' if script_stat.stat.exists else 'Not found' }}"
          - "Persistent config: {{ 'Deployed' if config_stat.stat.exists else 'Not found' }}"
          - "{{ bird_version | default('bird2') }} installed: {{ 'Yes' if bird_installed.rc == 0 else 'No' }}"
          - "Pathvector installed: {{ 'Yes' if pathvector_installed.rc == 0 else 'No' }}"
          - "Script will run automatically on next boot"

# Optional: Manual installation without waiting for reboot
- name: Provide manual installation instructions
  ansible.builtin.debug:
    msg:
      - "=== Manual Installation Instructions ==="
      - "To install immediately without waiting for reboot:"
      - "  ssh root@{{ inventory_hostname }}"
      - "  /data/on_boot.d/{{ pathvector_unifi_script_name | default('01-unifi-pathvector-setup.sh') }}"
      - ""
      - "To check installation status:"
      - "  tail -f /var/log/unifi-pathvector-setup.log"
  when:
    - not (pathvector_unifi_run_immediately | default(true))
    - pathvector_debug | bool
